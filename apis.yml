aid: amazon-compute-optimizer
name: Amazon Compute Optimizer
description: >-
  Amazon Compute Optimizer analyzes the configuration and utilization metrics of
  your AWS resources and provides recommendations to help you identify optimal
  AWS resource configurations. It uses machine learning to analyze historical
  utilization metrics and generates rightsizing recommendations for EC2 instances,
  Auto Scaling groups, EBS volumes, Lambda functions, ECS services on Fargate,
  and RDS instances to help reduce costs and improve performance.
